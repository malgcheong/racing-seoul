<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>추억 여정 레이싱</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <!-- 1. 사진 업로드 화면 -->
  <section id="screen-upload" class="screen active">
    <div class="upload-wrap">
      <h1 class="logo">추억 여정 레이싱 <span class="badge">MVP</span></h1>
      <p class="tagline">소중한 사진들로 나만의 레이싱 맵을 만들어 추억 속을 달려보세요.</p>

      <div id="dropzone" class="dropzone">
        <div class="dropzone-inner">
          <div class="dz-icon">📷</div>
          <p><strong>사진을 여기로 드래그</strong>하거나</p>
          <button id="btn-file" class="btn btn-secondary" type="button">파일 선택</button>
          <button id="btn-demo" class="btn btn-ghost" type="button">샘플 사진으로 체험하기</button>
          <p class="hint">JPG · PNG · WEBP / 장당 최대 10MB / 최대 50장</p>
        </div>
        <input id="file-input" type="file" accept="image/jpeg,image/png,image/webp" multiple hidden />
      </div>

      <div id="gallery-section" class="gallery-section hidden">
        <div class="gallery-toolbar">
          <span id="select-count" class="select-count">0 / 0장 선택됨</span>
          <div class="toolbar-btns">
            <button id="btn-select-all" class="btn btn-small" type="button">전체 선택</button>
            <button id="btn-deselect-all" class="btn btn-small" type="button">전체 해제</button>
            <button id="btn-delete-selected" class="btn btn-small btn-danger" type="button">선택 삭제</button>
          </div>
        </div>
        <div id="gallery" class="gallery"></div>

        <div class="consent-box">
          <label><input type="checkbox" class="consent" id="consent-tos" /> 서비스 이용약관에 동의합니다.</label>
          <label><input type="checkbox" class="consent" id="consent-privacy" /> 개인정보 처리방침에 동의합니다. <span class="hint-inline">(MVP: 사진은 브라우저를 벗어나지 않습니다)</span></label>
          <label><input type="checkbox" class="consent" id="consent-copyright" /> 업로드하는 사진에 저작권·초상권 문제가 없음을 확인합니다.</label>
        </div>

        <button id="btn-generate" class="btn btn-primary btn-big" type="button" disabled>맵 생성 시작</button>
        <p class="hint" id="generate-hint">최소 5장 이상 선택하고 약관에 동의하면 시작할 수 있어요.</p>
      </div>
    </div>
  </section>

  <!-- 2. 맵 생성 진행 화면 -->
  <section id="screen-generating" class="screen">
    <div class="gen-wrap">
      <h2 id="gen-status">사진 분석 중…</h2>
      <div class="progress-track"><div id="gen-progress" class="progress-fill"></div></div>
      <p id="gen-detail" class="gen-detail"></p>
    </div>
  </section>

  <!-- 3. 게임 화면 -->
  <section id="screen-game" class="screen">
    <div id="game-container"></div>
    <div id="hud" class="hud hidden">
      <div class="hud-top">
        <div class="hud-item"><span class="hud-label">LAP</span><span id="hud-lap">1/3</span></div>
        <div class="hud-item"><span class="hud-label">TIME</span><span id="hud-time">0:00.0</span></div>
        <div class="hud-item"><span class="hud-label">SCORE</span><span id="hud-score">0</span></div>
        <div class="hud-item"><span class="hud-label">추억</span><span id="hud-memories">0/0</span></div>
      </div>
      <div class="hud-speed"><span id="hud-speed">0</span><span class="hud-unit">km/h</span></div>
      <div id="boost-indicator" class="boost-indicator hidden">🚀 부스터!</div>
    </div>
    <div id="countdown" class="countdown hidden"></div>
    <div class="controls-hint">↑↓←→ / WASD 로 운전 · Shift 드리프트</div>
  </section>

  <!-- 4. 결과 화면 -->
  <section id="screen-result" class="screen">
    <div class="result-wrap">
      <h2>완주! 🏁</h2>
      <div class="result-stats">
        <div class="result-row"><span>총 기록</span><strong id="result-time">-</strong></div>
        <div class="result-row"><span>베스트 랩</span><strong id="result-best">-</strong></div>
        <div class="result-row"><span>점수</span><strong id="result-score">-</strong></div>
        <div class="result-row"><span>회상한 추억</span><strong id="result-memories">-</strong></div>
      </div>
      <div class="result-btns">
        <button id="btn-regenerate" class="btn btn-primary" type="button">같은 사진으로 새로운 맵</button>
        <button id="btn-back-upload" class="btn btn-secondary" type="button">사진 다시 선택</button>
      </div>
    </div>
  </section>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
