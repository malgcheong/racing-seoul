<!doctype html>
<html>
<head><meta charset="UTF-8" /><title>car debug</title><style>body{margin:0;background:#223}pre{position:absolute;top:8px;left:8px;color:#fff;font-size:14px;z-index:9}</style></head>
<body>
<pre id="log"></pre>
<script type="module">
import * as THREE from 'three';
import { loadGameAssets, instantiate } from '/src/utils/assets.js';

await loadGameAssets();
const car = instantiate('car', { CarPaint: 0xff8844 });

const lines = [];
car.traverse((o) => {
  if (o.name || o.isMesh) {
    lines.push(`${o.type} "${o.name}" pos=[${o.position.toArray().map(v => v.toFixed(2))}]`);
  }
});
const wheel = car.getObjectByName('Wheel_FL');
const c1 = new THREE.Box3().setFromObject(wheel).getCenter(new THREE.Vector3());
wheel.rotateX(1.2);
const c2 = new THREE.Box3().setFromObject(wheel).getCenter(new THREE.Vector3());
lines.push(`FL 중심(회전 전): [${c1.toArray().map(v => v.toFixed(3))}]`);
lines.push(`FL 중심(rotateX 1.2 후): [${c2.toArray().map(v => v.toFixed(3))}]`);
lines.push(`중심 이동량: ${c1.distanceTo(c2).toFixed(4)} (0이어야 정상)`);
document.getElementById('log').textContent = lines.join('\n');

// 렌더: 차를 크게, 나머지 바퀴도 제각각 회전시켜 시각 확인
car.getObjectByName('Wheel_FR')?.rotateX(0.6);
car.getObjectByName('Wheel_RL')?.rotateX(2.0);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x334);
scene.add(new THREE.HemisphereLight(0xffffff, 0x445, 1.2));
const sun = new THREE.DirectionalLight(0xffffff, 2);
sun.position.set(5, 8, 6);
scene.add(sun);
scene.add(car);
const camera = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.1, 100);
camera.position.set(-5.5, 3.2, -5.5);
camera.lookAt(0, 0.8, 0);
renderer.render(scene, camera);
</script>
</body>
</html>
